name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: core (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test
        run: pytest -q

  test-adapters:
    name: adapters (py3.11, all SDKs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with optional adapter SDKs)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install langchain-core litellm google-genai openai anthropic jsonschema httpx
      - name: Test
        run: pytest -q
